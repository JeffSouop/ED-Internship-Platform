# Une seule entrée pour le conteneur « ui » : nginx écoute sur :80,
# le rendu TanStack tourne en local sur 127.0.0.1:8787 (wrangler dans le même conteneur).

upstream tanstack_worker {
    server 127.0.0.1:8787;
}

upstream backend_api {
    server api:4000;
}

server {
    listen 80;
    server_name _;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

    location /api/ {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    location ^~ /assets/ {
        root /app/dist/client;
        try_files $uri @assets_server;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location @assets_server {
        internal;
        root /app/dist/server;
    }

    location ~* ^/(hero-culinary|card-student|card-company|campus-paris|favicon|apple-touch).*\.(png|jpg|jpeg|webp|ico|svg)$ {
        root /app/dist/client;
        try_files $uri =404;
        access_log off;
    }

    location / {
        proxy_pass http://tanstack_worker;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_buffering off;
    }
}
