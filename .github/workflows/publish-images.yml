name: Publish container images

# Comme TaTi : images GHCR consommées via docker-compose.dist.yml (pull, pas de build serveur).
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag des images (ex. v1.0.0 ou latest)"
        required: true
        default: "latest"

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-images-${{ github.repository }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  meta:
    name: Registry metadata
    runs-on: ubuntu-latest
    outputs:
      owner_lc: ${{ steps.o.outputs.owner_lc }}
      tag: ${{ steps.o.outputs.tag }}
      push_latest: ${{ steps.o.outputs.push_latest }}
    steps:
      - id: o
        run: |
          set -euo pipefail
          OWNER_LC="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "owner_lc=$OWNER_LC" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "push_latest=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
            echo "push_latest=true" >> "$GITHUB_OUTPUT"
          fi

  push-images:
    name: Image ${{ matrix.image }}
    needs: [meta]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ed-internship-postgres
            context: .
            dockerfile: deploy/postgres/Dockerfile
            build_args: ""
          - image: ed-internship-api
            context: .
            dockerfile: docker/Dockerfile.api
            build_args: ""
          - image: ed-internship-ui
            context: .
            dockerfile: docker/Dockerfile.ui
            build_args: |
              VITE_FORM_ACCESS_PASSWORD=ducasse2026
              VITE_API_URL=

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && format('refs/tags/{0}', github.event.release.tag_name) || github.ref }}

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag list
        id: tl
        run: |
          REG="${{ env.REGISTRY }}/${{ needs.meta.outputs.owner_lc }}/${{ matrix.image }}"
          TAG="${{ needs.meta.outputs.tag }}"
          {
            echo "tags<<EOF"
            echo "${REG}:${TAG}"
            if [ "${{ needs.meta.outputs.push_latest }}" = "true" ]; then
              echo "${REG}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.tl.outputs.tags }}
          build-args: ${{ matrix.build_args || '' }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
