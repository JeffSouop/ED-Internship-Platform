# Chaîne type TaTi (même idée produit différente, sans LLM/MCP ici) :
#
#   Navigateur ──► une seule origine « app » (UI + routes /api via nginx dans « ui »)
#                       │
#                       ├──► api (Express) ──► postgres (données métier)
#                       │
#                       └──► pas de connexion navigateur → Postgres : tout passe par /api.
#
# Ports exposés sur l’hôte :
#   8080 → entrée utilisateur (pages + /api proxifié vers le backend).
#   4000 → API seule (debug / outils), optionnel au quotidien.
#   5433 → Postgres (debug / pg_dump / scripts locaux), pas pour le front.
#
# Les futurs services externes (webhooks, autres APIs) se brancheraient sur « api » par variables
# d’environnement — comme les MCP sont appelés uniquement par le backend TaTi, pas par le navigateur.
#
# Prérequis :
#   - backend/.env (Brevo, DocuSign, APP_PUBLIC_URL, …) — chargé par le service api
#   - private.key à la racine (DocuSign) — sinon commentez le volume private.key ci-dessous
#   - Rebuild stack (UI compilée sur le Mac, pas dans Docker — évite OOM SSR) :
#       npm run compose:up
#     ou après changement front seul : npm run build && docker compose up -d --build ui
#   - Import Excel (entreprises) à la racine : COMPANY DATABASE.xlsx (gitignoré)
#       npm run import:companies
#     ou : docker compose exec api node dist/import-companies-cli.js

services:
  postgres:
    image: postgres:16-alpine
    container_name: ed-internship-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ducasse_careers
      POSTGRES_USER: ducasse
      POSTGRES_PASSWORD: ducasse_local_dev
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./backend/db/seed_demo.sql:/docker-entrypoint-initdb.d/02_seed_demo.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ducasse -d ducasse_careers"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ed-internship-api
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Réseau Docker (remplace localhost:5433 de backend/.env)
      DATABASE_URL: postgresql://ducasse:ducasse_local_dev@postgres:5432/ducasse_careers
      PORT: "4000"
      # Modèles / clé en lecture seule ; documents générés sous /app/data (évite errno -35 Mac+iCloud sur ./convention)
      CONVENTION_TEMPLATE_PATH: /workspace/templates/Modele2025ConventiondestageFPADv0.11.docx
      CONVENTION_OUTPUT_DIR: /app/data/convention
      ATTESTATION_TEMPLATE_PATH: /workspace/templates/Modele2024Attestationdestage.docx
      ATTESTATION_OUTPUT_DIR: /app/data/attestation
      RUPTURE_TEMPLATE_PATH: /workspace/templates/ModeleRupturedeconvention.docx
      RUPTURE_OUTPUT_DIR: /app/data/rupture
      DOCUSIGN_PRIVATE_KEY_PATH: /workspace/private.key
    ports:
      - "4000:4000"
    volumes:
      - ./backend/data:/app/data
      - ./templates:/workspace/templates:ro
      - "./COMPANY DATABASE.xlsx:/workspace/COMPANY DATABASE.xlsx:ro"
      - ./private.key:/workspace/private.key:ro
    depends_on:
      postgres:
        condition: service_healthy

  ui:
    build:
      context: .
      dockerfile: docker/Dockerfile.ui.from-dist
      # dist/ produit par « npm run build » sur l’hôte (voir npm run compose:up)
    container_name: ed-internship-ui
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      HOME: /tmp
      WRANGLER_SEND_METRICS: "false"
    depends_on:
      - api

volumes:
  pgdata:
